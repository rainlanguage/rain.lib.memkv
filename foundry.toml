[package]
name = "rain-lib-memkv"
version = "0.1.0"

[profile.default]

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"

optimizer = true
optimizer_runs = 100000

evm_version = "cancun"

libs = ["dependencies"]

[fuzz]
runs = 1024

[dependencies]
forge-std = "1.16.1"
"rain-solmem" = "0.1.3"
"rain-lib-hash" = "0.1.0"

[soldeer]
recursive_deps = false
